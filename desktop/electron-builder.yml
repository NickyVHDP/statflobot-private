# Base electron-builder configuration for StatfloBot.
#
# This file is auto-discovered by electron-builder (takes precedence over
# the package.json "build" key). Do not duplicate settings here AND in
# package.json — keep them here only.
#
# Build scripts:
#   npm run build:mac:arm64  → electron-builder --mac --arm64
#   npm run build:mac:x64    → electron-builder --mac --x64
#   npm run build:mac        → runs both sequentially
#   npm run build:win        → electron-builder --win

appId: com.statflobot.app
productName: StatfloBot
copyright: "Copyright © 2026 StatfloBot"
asar: true
afterSign: ./scripts/notarize.js

directories:
  buildResources: assets
  output: dist

files:
  - electron/**
  - node_modules/**
  - package.json

extraResources:
  - from: ../ui/client/dist
    to: ui/client/dist

  - from: ../ui/server
    to: ui/server
    filter:
      - "**/*"
      - "!node_modules/**"

  - from: ../ui/server/node_modules
    to: ui/server/node_modules

  - from: ../src
    to: src

  - from: ../node_modules
    to: node_modules

  - from: ../package.json
    to: package.json

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  identity: "Nicky McCracken (2M4NY6J26Z)"
  notarize: false
  target:
    - target: dmg
    - target: zip

win:
  icon: assets/icon.ico
  # Produce exactly one artifact: the NSIS installer named StatfloBot-windows.exe.
  # The win-unpacked/ directory is still written to dist/ as an intermediate but
  # is NOT the distributable — always upload StatfloBot-windows.exe, never the
  # raw .exe inside win-unpacked/.
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  # perMachine: false → per-user install; does not require admin for fresh installs.
  # This also means NSIS can replace the app directory without UAC for users who
  # originally installed it themselves, reducing "access denied" failures.
  perMachine: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: false
  unicode: true
  # Fixed artifact name — no version or arch suffix so the URL never changes
  # between releases and no manual renaming is ever needed.
  artifactName: StatfloBot-windows.exe

dmg:
  title: Install StatfloBot
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications